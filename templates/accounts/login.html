{% extends 'base.html' %}

{% block title %}Accedi — MusicStream{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4">
            <h2 class="mb-4 text-center">Accedi</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-gradient w-100">Accedi</button>
            </form>
            <p class="text-center mt-3">
                Non hai un account? <a href="{% url 'accounts:register' %}">Registrati</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
